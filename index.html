<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Wayback Availability Checker</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="container">
      <h1>Wayback Availability Checker</h1>

      <form id="lookup-form">
        <label for="url">URL</label>
        <input id="url" name="url" type="text" placeholder="https://example.com" required>

        <label for="timestamp">Timestamp (optional)</label>
        <input id="timestamp" name="timestamp" type="text" placeholder="YYYYMMDDhhmmss">

        <div class="actions">
          <button id="check" type="submit">Check Wayback</button>
        </div>
      </form>

      <section id="result" aria-live="polite"></section>
      <footer class="note">Powered by the Internet Archive Wayback Availability API</footer>
    </main>

    <script src="app.js"></script>
  </body>
</html>
